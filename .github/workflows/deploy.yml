name: Deploy to Oracle VPS

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version (patch)
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${VERSION} [skip ci]"
          git push origin master
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Deploy sur le VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 30m
          script: |
            cd navis
            git pull origin master

            sudo docker build -t navis .

            sudo docker stop navis || true
            sudo docker rm navis || true

            sudo docker run -d \
              --name navis \
              --restart always \
              -p 3000:3000 \
              -v /home/ubuntu/dungeon-data:/var/data/navis \
              -e DATA_DIRECTORY=/var/data/navis \
              -e DM_PASSWORD='${{ secrets.DM_PASSWORD }}' \
              -e PC_PASSWORD='${{ secrets.PC_PASSWORD }}' \
              navis

            sudo docker image prune -f
