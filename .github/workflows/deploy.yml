name: "[Auto] Build, Push & Deploy to VPS"

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version (patch)
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${VERSION} [skip ci]"
          git push origin master
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: axelvaillant/compass-map:latest

      - name: Deploy sur le VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 10m
          command_timeout: 10m
          script: |
            echo '${{ secrets.DOCKERHUB_TOKEN }}' | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            sudo docker pull axelvaillant/compass-map:latest
            sudo docker stop navis || true
            sudo docker rm navis || true
            sudo docker run -d \
              --name navis \
              --restart always \
              -p 3000:3000 \
              -v /home/ubuntu/navis-data:/var/data/navis \
              -e DATA_DIRECTORY=/var/data/navis \
              -e DM_PASSWORD='${{ secrets.DM_PASSWORD }}' \
              -e PC_PASSWORD='${{ secrets.PC_PASSWORD }}' \
              axelvaillant/compass-map:latest
            sudo docker image prune -f
